<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang-key="pranam"></title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <style>
      body {
        background-image: url("./assets/images/bg-image.png");
      }
    </style>
  </head>

  <body class="loaded">
    <a href="types-of-daan.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="language-container">
      <div class="english active">E</div>
      <div class="hindi">H</div>
      <div class="gujarati">G</div>
    </div>

    <div class="pranam-container">
      <div class="pranam-img">
        <span data-lang-key="pranam"></span>
        <img src="./assets/images/pranam-img.png" alt="" />
      </div>

      <a href="index.html" class="home-btn-1">
        <span data-lang-key="home"></span>
        <img src="./assets/images/home-btn-1.png" alt="" />
      </a>
    </div>

    <!-- Audios -->
    <audio id="pranamAudio" src="./assets/audio/pranam.mp3" preload="auto"></audio>

    <audio id="backAudio" src="./assets/audio/pop.mp3" preload="auto"></audio>
    <audio id="homeAudio" src="./assets/audio/5.mp3" preload="auto"></audio>

    <audio id="engAudio" src="./assets/audio/Eng.mpeg" preload="auto"></audio>
    <audio id="hinAudio" src="./assets/audio/Hin.mpeg" preload="auto"></audio>
    <audio id="gujAudio" src="./assets/audio/Guj.mpeg" preload="auto"></audio>

    <script src="./assets/js/app.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const backBtn = document.querySelector(".back-btn");
        const homeBtn = document.querySelector(".home-btn-1");

        const englishBtn = document.querySelector(".english");
        const hindiBtn = document.querySelector(".hindi");
        const gujaratiBtn = document.querySelector(".gujarati");

        const pranamAudio = document.getElementById("pranamAudio");

        const backAudio = document.getElementById("backAudio");
        const homeAudio = document.getElementById("homeAudio");

        const engAudio = document.getElementById("engAudio");
        const hinAudio = document.getElementById("hinAudio");
        const gujAudio = document.getElementById("gujAudio");

        function stopAllAudio() {
          const audios = [
            pranamAudio,
            backAudio,
            homeAudio,
            engAudio,
            hinAudio,
            gujAudio,
          ];

          audios.forEach((audio) => {
            if (audio) {
              audio.pause();
              audio.currentTime = 0;
            }
          });
        }

        function playAudio(audio) {
          if (!audio) return;

          stopAllAudio();
          audio.currentTime = 0;

          const playPromise = audio.play();

          if (playPromise !== undefined) {
            playPromise.catch((error) => {
              console.log("Audio autoplay blocked or file path issue:", error);
            });
          }
        }

        // Only play pranam.mp3 once on page load
        playAudio(pranamAudio);

        backBtn?.addEventListener("click", function (e) {
          e.preventDefault();

          playAudio(backAudio);

          setTimeout(() => {
            window.location.href = this.href;
          }, 500);
        });

        homeBtn?.addEventListener("click", function (e) {
          e.preventDefault();

          playAudio(homeAudio);

          setTimeout(() => {
            window.location.href = this.href;
          }, 600);
        });

        englishBtn?.addEventListener("click", () => {
          playAudio(engAudio);
        });

        hindiBtn?.addEventListener("click", () => {
          playAudio(hinAudio);
        });

        gujaratiBtn?.addEventListener("click", () => {
          playAudio(gujAudio);
        });
      });
    </script>
  </body>
</html>
