<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang-key="title-4"></title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />

    <style>
      body {
        background-image: url("./assets/images/bg-image.png");
      }
    </style>
  </head>

  <body class="loaded">
    <a class="home-btn" href="index.html">
      <img src="./assets/images/home-btn.png" alt="Home" />
    </a>

    <div class="language-container">
      <div class="english active">E</div>
      <div class="hindi">H</div>
      <div class="gujarati">G</div>
    </div>

    <main>
      <div class="home-container">
        <div class="left-home-container">
          <div class="title">
            <span data-lang-key="title"></span>
            <span class="description" data-lang-key="description"></span>
          </div>

          <div class="image-swiper swiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <video src="./assets/videos/4-1.mp4" autoplay muted loop></video>
              </div>

              <div class="swiper-slide">
                <video src="./assets/videos/4-2.mp4" autoplay muted loop></video>
              </div>

              <div class="swiper-slide">
                <video src="./assets/videos/4-3.mp4" autoplay muted loop></video>
              </div>

              <div class="swiper-slide">
                <video src="./assets/videos/4-4.mp4" autoplay muted loop></video>
              </div>

              <div class="swiper-slide">
                <video src="./assets/videos/4-5.mp4" autoplay muted loop></video>
              </div>

              <div class="swiper-slide">
                <video src="./assets/videos/4-6.mp4" autoplay muted loop></video>
              </div>
            </div>
          </div>

          <div class="custom-nav">
            <button class="custom-prev hidden">
              <img src="./assets/images/prev-btn.png" alt="" />
            </button>

            <button class="custom-next">
              <img src="./assets/images/next-btn.png" alt="" />
            </button>
          </div>
        </div>

        <div class="right-home-container">
          <div class="page-title" data-lang-key="title-4"></div>

          <div class="text-swiper swiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <div class="text-box">
                  <p data-lang-key="slide-4.1"></p>
                </div>
              </div>

              <div class="swiper-slide">
                <div class="text-box">
                  <p data-lang-key="slide-4.2"></p>
                </div>
              </div>

              <div class="swiper-slide">
                <div class="text-box">
                  <p data-lang-key="slide-4.3"></p>
                </div>
              </div>

              <div class="swiper-slide">
                <div class="text-box">
                  <p data-lang-key="slide-4.4"></p>
                </div>
              </div>

              <div class="swiper-slide">
                <div class="text-box">
                  <p data-lang-key="slide-4.5"></p>
                </div>
              </div>

              <div class="swiper-slide">
                <div class="text-box">
                  <p data-lang-key="slide-4.6"></p>
                </div>
              </div>
            </div>
          </div>

          <div class="pages">
            <a
              href="what-is-daan.html"
              class="page page-1"
              data-lang-key="num-1"
            ></a>

            <a
              href="why-should-we-give.html"
              class="page page-2"
              data-lang-key="num-2"
            ></a>

            <a
              href="what-can-we-give.html"
              class="page page-3"
              data-lang-key="num-3"
            ></a>

            <a
              href="types-of-daan.html"
              class="page page-4"
              data-lang-key="num-4"
            ></a>
          </div>
        </div>
      </div>
    </main>

    <!-- Audios -->
    <audio id="homeAudio" src="./assets/audio/pop.mp3" preload="auto"></audio>
    <audio id="pageAudio" src="./assets/audio/11.mp3" preload="auto"></audio>
    <audio id="navAudio" src="./assets/audio/5.mp3" preload="auto"></audio>

    <audio id="engAudio" src="./assets/audio/Eng.mpeg" preload="auto"></audio>
    <audio id="hinAudio" src="./assets/audio/Hin.mpeg" preload="auto"></audio>
    <audio id="gujAudio" src="./assets/audio/Guj.mpeg" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="./assets/js/app.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const homeBtn = document.querySelector(".home-btn");
        const pageBtns = document.querySelectorAll(".pages .page");
        const prevBtn = document.querySelector(".custom-prev");
        const nextBtn = document.querySelector(".custom-next");

        const englishBtn = document.querySelector(".english");
        const hindiBtn = document.querySelector(".hindi");
        const gujaratiBtn = document.querySelector(".gujarati");

        const homeAudio = document.getElementById("homeAudio");
        const pageAudio = document.getElementById("pageAudio");
        const navAudio = document.getElementById("navAudio");

        const engAudio = document.getElementById("engAudio");
        const hinAudio = document.getElementById("hinAudio");
        const gujAudio = document.getElementById("gujAudio");

        function stopAllAudio() {
          const audios = [
            homeAudio,
            pageAudio,
            navAudio,
            engAudio,
            hinAudio,
            gujAudio,
          ];

          audios.forEach((audio) => {
            if (audio) {
              audio.pause();
              audio.currentTime = 0;
            }
          });
        }

        function playAudio(audio) {
          if (!audio) return;

          stopAllAudio();
          audio.currentTime = 0;

          const playPromise = audio.play();

          if (playPromise !== undefined) {
            playPromise.catch((error) => {
              console.log("Audio not playing. Check file path or browser:", error);
            });
          }
        }

        const textSwiper = new Swiper(".text-swiper", {
          effect: "fade",
          fadeEffect: {
            crossFade: true,
          },
          speed: 1200,
          allowTouchMove: false,
        });

        const imageSwiper = new Swiper(".image-swiper", {
          effect: "fade",
          fadeEffect: {
            crossFade: true,
          },
          speed: 1200,
          allowTouchMove: false,
          navigation: {
            prevEl: ".custom-prev",
            nextEl: ".custom-next",
          },
          controller: {
            control: textSwiper,
          },
        });

        textSwiper.controller.control = imageSwiper;

        function updateNavButtons(swiper) {
          if (swiper.isBeginning) {
            prevBtn?.classList.add("hidden");
          } else {
            prevBtn?.classList.remove("hidden");
          }

          nextBtn?.classList.remove("hidden");
        }

        updateNavButtons(imageSwiper);

        imageSwiper.on("slideChange", function () {
          updateNavButtons(imageSwiper);
        });

        homeBtn?.addEventListener("click", function (e) {
          e.preventDefault();

          playAudio(homeAudio);

          setTimeout(() => {
            window.location.href = this.href;
          }, 500);
        });

        pageBtns.forEach((pageBtn) => {
          pageBtn.addEventListener("click", function (e) {
            e.preventDefault();

            playAudio(pageAudio);

            setTimeout(() => {
              window.location.href = this.href;
            }, 600);
          });
        });

        prevBtn?.addEventListener("click", () => {
          playAudio(navAudio);
        });

        nextBtn?.addEventListener("click", function (e) {
          playAudio(navAudio);

          if (imageSwiper.isEnd) {
            e.preventDefault();

            setTimeout(() => {
              window.location.href = "pranam.html";
            }, 600);
          }
        });

        englishBtn?.addEventListener("click", () => {
          playAudio(engAudio);
        });

        hindiBtn?.addEventListener("click", () => {
          playAudio(hinAudio);
        });

        gujaratiBtn?.addEventListener("click", () => {
          playAudio(gujAudio);
        });
      });
    </script>
  </body>
</html>
