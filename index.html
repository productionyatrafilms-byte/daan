<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang-key="title">Daan</title>
    <link rel="stylesheet" href="./assets/css/style.css" />

    <style>
      body {
        background-image: url("./assets/images/bg-image.png");
      }
    </style>
  </head>

  <body class="loaded">
    <div class="language-container">
      <div class="english active">E</div>
      <div class="hindi">H</div>
      <div class="gujarati">G</div>
    </div>

    <main>
      <div class="home-container">
        <div class="left-home-container">
          <div class="title">
            <span data-lang-key="title"></span>
            <span class="description" data-lang-key="description"></span>
          </div>

          <div class="hero-img-wrap">
            <div class="hero-img">
              <video src="./assets/videos/home pg.mp4" autoplay muted loop></video>
            </div>
          </div>
        </div>

        <div class="right-home-container">
          <div class="topics">
            <a
              href="what-is-daan.html"
              class="topic topic-1"
              data-lang-key="title-1"
            ></a>

            <a
              href="why-should-we-give.html"
              class="topic topic-2"
              data-lang-key="title-2"
            ></a>

            <a
              href="what-can-we-give.html"
              class="topic topic-3"
              data-lang-key="title-3"
            ></a>

            <a
              href="types-of-daan.html"
              class="topic topic-4"
              data-lang-key="title-4"
            ></a>
          </div>
        </div>
      </div>
    </main>

    <!-- Audios -->
    <audio id="topicAudio" src="./assets/audio/11.mp3" preload="auto"></audio>

    <audio id="engAudio" src="./assets/audio/Eng.mpeg" preload="auto"></audio>
    <audio id="hinAudio" src="./assets/audio/Hin.mpeg" preload="auto"></audio>
    <audio id="gujAudio" src="./assets/audio/Guj.mpeg" preload="auto"></audio>

    <script src="./assets/js/app.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const topicBtns = document.querySelectorAll(".topic");

        const englishBtn = document.querySelector(".english");
        const hindiBtn = document.querySelector(".hindi");
        const gujaratiBtn = document.querySelector(".gujarati");

        const topicAudio = document.getElementById("topicAudio");

        const engAudio = document.getElementById("engAudio");
        const hinAudio = document.getElementById("hinAudio");
        const gujAudio = document.getElementById("gujAudio");

        function stopAllAudio() {
          const audios = [topicAudio, engAudio, hinAudio, gujAudio];

          audios.forEach((audio) => {
            if (audio) {
              audio.pause();
              audio.currentTime = 0;
            }
          });
        }

        function playAudio(audio) {
          if (!audio) return;

          stopAllAudio();
          audio.currentTime = 0;

          const playPromise = audio.play();

          if (playPromise !== undefined) {
            playPromise.catch((error) => {
              console.log("Audio not playing. Check file path or browser:", error);
            });
          }
        }

        topicBtns.forEach((topicBtn) => {
          topicBtn.addEventListener("click", function (e) {
            e.preventDefault();

            playAudio(topicAudio);

            setTimeout(() => {
              window.location.href = this.href;
            }, 600);
          });
        });

        englishBtn?.addEventListener("click", () => {
          playAudio(engAudio);
        });

        hindiBtn?.addEventListener("click", () => {
          playAudio(hinAudio);
        });

        gujaratiBtn?.addEventListener("click", () => {
          playAudio(gujAudio);
        });
      });
    </script>
  </body>
</html>
